<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.9</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{margin:0;background:#000;color:#00ff88;font-family:Arial, sans-serif;overflow:hidden;}
.tab{display:none;height:100vh;padding:10px;box-sizing:border-box;}
.active{display:block;}
h1{text-align:center;margin:0;font-size:22px;}
#speed{font-size:90px;text-align:center;margin-top:10px;}
#rpm{width:120px;height:120px;margin:0 auto;}
.smallData{text-align:center;font-size:16px;margin:3px 0;color:#aaa;}
#map{height:70vh;margin-top:10px;}
.bottomBar{position:fixed;bottom:0;width:100%;display:flex;background:#111;}
.bottomBar button{flex:1;padding:15px;background:#111;border:none;color:#00ff88;font-size:16px;cursor:pointer;}
.controls{text-align:center;margin-top:5px;}
.controls button{margin:3px;padding:6px 12px;background:#00ff88;border:none;color:#000;font-weight:bold;cursor:pointer;}
input,select{margin:3px;padding:4px;border-radius:4px;border:none;}
canvas{display:block;margin:0 auto;}
</style>
</head>
<body>

<div id="dashboard" class="tab active">
<h1>V.9 - Dashboard</h1>

<div id="speed">0 km/h</div>
<div class="smallData">Distancia: <span id="distance">0</span> km</div>
<div class="smallData">Autonomía restante: <span id="range">0</span> km</div>
<div class="smallData">Tiempo: <span id="time">0</span> s</div>
<div class="smallData">Gasolina restante: <span id="fuelLeft">0</span> L</div>

<div class="controls">
<button onclick="startTracking()">Iniciar</button>
<button onclick="pauseTracking()">Pausar</button>
<button onclick="resetTracking()">Reiniciar</button>
</div>

<div style="text-align:center;">
<select id="vehicle">
<option value="17|38">Spark</option>
<option value="16|55">Vento</option>
<option value="15|45">Chevy</option>
<option value="18|35">Matiz</option>
<option value="7|100">Suburban</option>
<option value="6|98">Tahoe</option>
<option value="14|50">Tsuru</option>
<option value="32|12">Ryder 190</option>
<option value="30|14">Motocicleta 199</option>
</select>
</div>

<div style="text-align:center;">
<input type="number" id="litersAdded" placeholder="Litros cargados">
<input type="number" id="fuelCost" placeholder="Costo por litro">
<button onclick="addFuel()">Agregar gasolina</button>
</div>
<div class="smallData">Total gastado: $<span id="totalCost">0</span></div>
</div>

<div id="mapTab" class="tab">
<h1>V.9 - Mapa</h1>
<canvas id="mapSpeedometer" width="300" height="150"></canvas>
<canvas id="mapRPM" width="120" height="120"></canvas>
<div id="map" ></div>
<div class="smallData">Distancia: <span id="distanceMap">0</span> km</div>
<div class="smallData">Autonomía restante: <span id="rangeMap">0</span> km</div>
</div>

<div class="bottomBar">
<button onclick="showTab('dashboard')">Panel</button>
<button onclick="showTab('mapTab')">Mapa</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let watchId=null,startTime=0,elapsed=0,timerInterval=null;
let distance=0,lastPosition=null,fuel=0,totalCost=0,kmPerLiter=17;
let tankCapacity=38;

let map = L.map('map').setView([19.4326, -99.1332], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let polyline = L.polyline([], {color:'#00ff88'}).addTo(map);

function showTab(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
map.invalidateSize();
}

function startTracking(){
if(navigator.geolocation && !watchId){
startTime=Date.now();
timerInterval=setInterval(updateTime,1000);
watchId=navigator.geolocation.watchPosition(updatePosition,errorHandler,{enableHighAccuracy:true});
}
}

function pauseTracking(){
if(watchId){
navigator.geolocation.clearWatch(watchId);
watchId=null;
clearInterval(timerInterval);
elapsed += Math.floor((Date.now()-startTime)/1000);
}
}

function resetTracking(){
pauseTracking();
distance=0;elapsed=0;fuel=0;totalCost=0;lastPosition=null;
polyline.setLatLngs([]);
updateUI(0);updateMapUI(0);
}

function updateTime(){
let currentElapsed=elapsed + Math.floor((Date.now()-startTime)/1000);
document.getElementById("time").innerText=currentElapsed;
}

function updatePosition(pos){
let lat=pos.coords.latitude,lon=pos.coords.longitude;
let speed=pos.coords.speed?pos.coords.speed*3.6:0;

if(lastPosition){
let d=getDistance(lat,lon,lastPosition.lat,lastPosition.lon);
distance+=d;
let fuelUsed=d/kmPerLiter;
fuel-=fuelUsed;if(fuel<0) fuel=0;
}
lastPosition={lat,lon};
polyline.addLatLng([lat,lon]);map.setView([lat,lon],16);

updateUI(speed);updateMapUI(speed);
}

function updateUI(speed){
document.getElementById("speed").innerText=speed.toFixed(0)+" km/h";
document.getElementById("distance").innerText=distance.toFixed(2);
document.getElementById("range").innerText=(fuel*kmPerLiter).toFixed(0);
document.getElementById("fuelLeft").innerText=fuel.toFixed(2);
document.getElementById("totalCost").innerText=totalCost.toFixed(2);
drawSpeedometer(speed,'mapSpeedometer');
drawRPM(speed*40,'mapRPM');
}

function updateMapUI(speed){updateUI(speed);}

function addFuel(){
let liters=parseFloat(document.getElementById("litersAdded").value)||0;
let costPerLiter=parseFloat(document.getElementById("fuelCost").value)||0;
fuel+=liters;totalCost+=liters*costPerLiter;
updateUI(0);
}

document.getElementById("vehicle").addEventListener('change',function(){
let v=this.value.split('|');kmPerLiter=parseFloat(v[0]);tankCapacity=parseFloat(v[1]);
fuel=tankCapacity;updateUI(0);
});

function getDistance(lat1,lon1,lat2,lon2){
let R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
let a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return R*c;
}

function errorHandler(e){console.log(e);}

// Velocímetro semicircular
function drawSpeedometer(speed,canvasId){
let c=document.getElementById(canvasId),ctx=c.getContext('2d');
ctx.clearRect(0,0,c.width,c.height);
let cx=c.width/2,cy=c.height*0.9,radius=c.height*0.8;
ctx.beginPath();
ctx.arc(cx,cy,radius,Math.PI,2*Math.PI);
ctx.strokeStyle="#222";ctx.lineWidth=10;ctx.stroke();
let angle=Math.PI + (speed/200)*Math.PI;
ctx.beginPath();ctx.moveTo(cx,cy);
ctx.lineTo(cx+radius*Math.cos(angle),cy+radius*Math.sin(angle));
ctx.strokeStyle="#fff";ctx.lineWidth=4;ctx.stroke();
ctx.fillStyle="#fff";ctx.font="20px Arial";ctx.textAlign="center";ctx.fillText(speed.toFixed(0)+" km/h",cx,cy+30);
}

// Tacómetro semicircular
function drawRPM(rpm,canvasId){
let c=document.getElementById(canvasId),ctx=c.getContext('2d');
ctx.clearRect(0,0,c.width,c.height);
let cx=c.width/2,cy=c.height*0.9,radius=c.height*0.8;
ctx.beginPath();
ctx.arc(cx,cy,radius,Math.PI,2*Math.PI);
ctx.strokeStyle="#222";ctx.lineWidth=8;ctx.stroke();
let angle=Math.PI + Math.min(rpm/8000,1)*Math.PI;
ctx.beginPath();ctx.moveTo(cx,cy);
ctx.lineTo(cx+radius*Math.cos(angle),cy+radius*Math.sin(angle));
ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();
ctx.fillStyle="#fff";ctx.font="14px Arial";ctx.textAlign="center";ctx.fillText(rpm.toFixed(0)+" RPM",cx,cy+25);
}

if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}

</script>
</body>
</html>
