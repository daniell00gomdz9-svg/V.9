<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tablero Tesla Style</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  background:#0b0b12;
  font-family:Arial,sans-serif;
  color:white;
  text-align:center;
}
button{
  padding:12px 20px;
  margin:5px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#7c3aed,#ff00ff);
  color:white;
  font-weight:bold;
}
.gauge-wrapper{
  position:relative;
  width:280px;
  height:280px;
  margin:20px auto;
}
.gauge{
  width:100%;
  height:100%;
  border-radius:50%;
  background:#111;
  border:4px solid #222;
  box-shadow:0 0 20px #4b0082;
}
.needle{
  position:absolute;
  width:4px;
  height:120px;
  background:white;
  top:20px;
  left:50%;
  transform-origin:bottom center;
  transform:rotate(-135deg);
  transition:transform 0.2s linear;
}
.digital-speed{
  font-size:70px;
  font-weight:bold;
}
#timer{font-size:20px;margin-top:10px;}
#kmCounter{font-size:16px;color:#aaa;}
#map{height:250px;margin-top:15px;border-radius:15px;}
</style>
</head>
<body>

<h2>Tablero Tesla Style</h2>

<button id="installBtn" style="display:none;">Descargar App</button>

<div id="timer">00:00:00</div>
<div id="kmCounter">Distancia: 0.00 km</div>

<div class="gauge-wrapper">
  <div class="gauge"></div>
  <div id="speedNeedle" class="needle"></div>
</div>

<div id="digitalSpeed" class="digital-speed">0</div>
<div>km/h</div>

<button onclick="startTracking()">Iniciar</button>
<button onclick="stopTracking()">Finalizar</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map=L.map('map').setView([19.4,-99.1],15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(map);

let route=[];
let poly=L.polyline(route,{color:'#a855f7',weight:6}).addTo(map);

let watchId;
let speed=0,lastPos=null,totalDistance=0;
let seconds=0,timerInterval;
let wakeLock=null;
let deferredPrompt;

// INSTALAR APP
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById("installBtn").style.display="inline-block";
});
document.getElementById("installBtn").addEventListener("click",async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt=null;
  document.getElementById("installBtn").style.display="none";
});

// SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

// WAKE LOCK
async function activarPantalla(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
    }
  }catch(e){console.log(e);}
}
async function desactivarPantalla(){
  if(wakeLock){await wakeLock.release();wakeLock=null;}
}
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible" && wakeLock){activarPantalla();}
});

// TIMER
function startTimer(){
  timerInterval=setInterval(()=>{
    seconds++;
    let h=Math.floor(seconds/3600);
    let m=Math.floor((seconds%3600)/60);
    let s=seconds%60;
    document.getElementById("timer").innerText=
      (h<10?"0":"")+h+":"+
      (m<10?"0":"")+m+":"+
      (s<10?"0":"")+s;
  },1000);
}
function stopTimer(){clearInterval(timerInterval);}

// TRACKING
function startTracking(){
  activarPantalla();
  startTimer();
  watchId=navigator.geolocation.watchPosition(pos=>{
    let point=[pos.coords.latitude,pos.coords.longitude];
    if(lastPos){
      let d=map.distance(lastPos,point)/1000;
      totalDistance+=d;
      document.getElementById("kmCounter").innerText=
        "Distancia: "+totalDistance.toFixed(2)+" km";
    }
    lastPos=point;
    route.push(point);
    poly.setLatLngs(route);
    map.setView(point);
    speed=pos.coords.speed?pos.coords.speed*3.6:0;
    updateDashboard();
  },()=>alert("Activa GPS"),{enableHighAccuracy:true});
}

function stopTracking(){
  navigator.geolocation.clearWatch(watchId);
  stopTimer();
  desactivarPantalla();
  lastPos=null;
}

function updateDashboard(){
  let deg=-135+(speed/200)*270;
  let needle=document.getElementById("speedNeedle");
  needle.style.transform="rotate("+deg+"deg)";
  document.getElementById("digitalSpeed").innerText=speed.toFixed(0);

  if(speed>5){
    needle.style.background="#a855f7";
    needle.style.boxShadow="0 0 15px #a855f7";
  }else{
    needle.style.background="white";
    needle.style.boxShadow="none";
  }
}
</script>

</body>
</html>
