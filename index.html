<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Auto</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

.dashboard{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:30px;
  margin-top:40px;
}

#batteryContainer{
  width:40px;
  height:220px;
  border:3px solid white;
  border-radius:10px;
  position:relative;
  background:#111;
}

#batteryLevel{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:limegreen;
  border-radius:7px;
  transition:0.4s;
}

canvas{
  background:#111;
  border-radius:50%;
}

#kmCounter{
  margin-top:20px;
  font-size:20px;
}

#fuelButton{
  position:fixed;
  bottom:30px;
  right:20px;
  font-size:24px;
  background:#222;
  color:white;
  border:none;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}

#fuelPanel{
  position:fixed;
  bottom:110px;
  right:20px;
  width:250px;
  background:#111;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.hidden{
  display:none;
}

#fuelPanel input{
  width:100%;
  margin-bottom:10px;
  padding:6px;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>Velocímetro Digital</h2>

<div class="dashboard">

  <div id="batteryContainer">
    <div id="batteryLevel"></div>
  </div>

  <canvas id="speedometer" width="250" height="250"></canvas>

</div>

<div id="kmCounter">Distancia: 0.00 km</div>

<button id="fuelButton">⛽</button>

<div id="fuelPanel" class="hidden">
  <h3>Combustible</h3>

  <label>Litros</label>
  <input type="number" id="litros" placeholder="Ej: 40">

  <label>Precio por litro</label>
  <input type="number" id="precioLitro" placeholder="Ej: 1.50">

  <button onclick="calcularGasolina()">Calcular</button>

  <div id="resultadoFuel"></div>
</div>

<script>
const canvas = document.getElementById("speedometer");
const ctx = canvas.getContext("2d");

let speed = 0;
let totalDistance = 0;
let lastPosition = null;

let capacidadTanque = 50;
let litrosActuales = 40;

function drawSpeedometer(speed){
  ctx.clearRect(0,0,250,250);

  ctx.beginPath();
  ctx.arc(125,125,100,0,2*Math.PI);
  ctx.strokeStyle="white";
  ctx.lineWidth=4;
  ctx.stroke();

  let angle = (speed/180)*Math.PI;

  ctx.beginPath();
  ctx.moveTo(125,125);
  ctx.lineTo(
    125 + 80*Math.cos(Math.PI - angle),
    125 - 80*Math.sin(Math.PI - angle)
  );
  ctx.strokeStyle="purple";
  ctx.lineWidth=5;
  ctx.stroke();

  ctx.font="20px Arial";
  ctx.fillStyle="white";
  ctx.fillText(speed.toFixed(0)+" km/h",90,200);
}

function calcularDistancia(pos1,pos2){
  const R=6371;
  const dLat=(pos2.latitude-pos1.latitude)*Math.PI/180;
  const dLon=(pos2.longitude-pos1.longitude)*Math.PI/180;
  const a=
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(pos1.latitude*Math.PI/180)*
    Math.cos(pos2.latitude*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

navigator.geolocation.watchPosition(position=>{
  const coords = position.coords;
  speed = coords.speed ? coords.speed*3.6 : 0;
  drawSpeedometer(speed);

  if(lastPosition){
    totalDistance += calcularDistancia(lastPosition,coords);
    document.getElementById("kmCounter").innerText =
      "Distancia: "+ totalDistance.toFixed(2) +" km";
  }

  lastPosition = coords;

},{enableHighAccuracy:true});

drawSpeedometer(0);

document.getElementById("fuelButton").addEventListener("click",()=>{
  document.getElementById("fuelPanel").classList.toggle("hidden");
});

function calcularGasolina(){
  const litros = parseFloat(document.getElementById("litros").value);
  const precio = parseFloat(document.getElementById("precioLitro").value);

  if(isNaN(litros)||isNaN(precio)) return;

  litrosActuales = litros;

  const total = litros*precio;
  const autonomia = litros*15;

  document.getElementById("resultadoFuel").innerHTML=
    "Total: $"+ total.toFixed(2)+"<br>"+
    "Autonomía estimada: "+ autonomia.toFixed(0)+" km";

  actualizarGasolina(litrosActuales);
}

function actualizarGasolina(litros){
  let porcentaje = (litros/capacidadTanque)*100;
  document.getElementById("batteryLevel").style.height =
    porcentaje+"%";

  if(porcentaje>50){
    document.getElementById("batteryLevel").style.background="limegreen";
  }else if(porcentaje>20){
    document.getElementById("batteryLevel").style.background="orange";
  }else{
    document.getElementById("batteryLevel").style.background="red";
  }
}

actualizarGasolina(litrosActuales);
</script>

</body>
</html>
