<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V.9</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
            --accent-color: #3388ff;
            --text-color: #ffffff;
            --accent-gradient: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
        }

        body {
            margin: 0;
            background: var(--bg-gradient);
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* --- DASHBOARD TOP --- */
        .dashboard-top {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid rgba(51, 136, 255, 0.3);
            background: rgba(0, 0, 0, 0.2);
            gap: 15px;
            flex-shrink: 0;
        }

        .side-container {
            width: 25px;
            height: 100px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(51, 136, 255, 0.3);
        }

        .side-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: var(--accent-gradient);
            transition: height 0.2s;
        }

        .gauge-container {
            position: relative;
            width: 130px;
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(51,136,255,0.1) 0%, rgba(0,0,0,0.5) 100%);
            box-shadow: 0 0 15px rgba(51, 136, 255, 0.4);
        }

        #bigSpeed {
            font-family: 'Orbitron', sans-serif;
            font-size: 45px;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .unit-label {
            font-size: 10px;
            color: #fff;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        /* --- PANEL DATOS --- */
        .data-panel-container {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--accent-color);
            flex-shrink: 0;
        }

        .data-item { text-align: center; }
        .data-label { font-size: 9px; color: #aab; text-transform: uppercase; letter-spacing: 1px; }
        .data-value { font-family: 'Orbitron', sans-serif; font-size: 16px; color: #fff; }

        /* --- MAPA --- */
        .map-container { 
            height: 120px; 
            flex-shrink: 0;
            z-index: 1;
            background: #000;
            border-bottom: 1px solid var(--accent-color);
        }
        #map { height: 100%; width: 100%; }

        /* --- HISTORIAL --- */
        .history-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            overflow-y: scroll;
            padding: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .history-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .history-table td { color: #fff; padding: 4px; border-bottom: 1px solid rgba(51, 136, 255, 0.2); }

        /* --- CONTROL PANEL --- */
        .control-panel {
            background: rgba(0, 0, 0, 0.6);
            border-top: 2px solid var(--accent-color);
            padding: 5px;
            flex-shrink: 0;
        }

        .grid-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        .input-group { display: flex; flex-direction: column; }
        input, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            -webkit-appearance: none;
        }
        label { color: var(--accent-color); font-size: 7px; text-transform: uppercase; letter-spacing: 1px; }

        .mode-selector { display: flex; justify-content: space-around; padding: 5px; }
        .mode-btn {
            color: #fff;
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid transparent;
        }
        .mode-btn.active {
            background: var(--accent-gradient);
            box-shadow: 0 0 10px rgba(51, 136, 255, 0.5);
            border-color: #fff;
        }

        .button-row { display: flex; gap: 5px; padding: 5px 0; }
        .btn-action {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid #fff;
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-save {
            background: var(--accent-gradient);
            border: none;
        }
    </style>
</head>
<body>

<div class="dashboard-top">
    <div class="side-container">
        <div class="side-bar" id="fuelBar"></div>
    </div>
    
    <div class="gauge-container">
        <h1 id="bigSpeed">0</h1>
        <div class="unit-label">KM/H</div>
    </div>

    <div class="side-container">
        <div class="side-bar" id="rpmBar"></div>
    </div>
</div>

<div class="data-panel-container">
    <div class="data-item">
        <span class="data-label">Distancia</span>
        <div class="data-value" id="distVal">0.00</div>
    </div>
    <div class="data-item">
        <span class="data-label">Autonomía</span>
        <div class="data-value" id="rangeVal">0</div>
    </div>
    <div class="data-item">
        <span class="data-label">Tiempo</span>
        <div class="data-value" id="timeVal">00:00</div>
    </div>
</div>

<div class="map-container">
    <div id="map"></div>
</div>

<div class="history-panel">
    <table class="history-table">
        <tbody id="historyBody"></tbody>
    </table>
</div>

<div class="control-panel">
    <div class="grid-panel">
        <div class="input-group">
            <label>VEHÍCULO</label>
            <select id="vehicleSelect" onchange="calculateRemainingKM()">
                <option value="Spark">Spark</option>
                <option value="Vento">Vento</option>
                <option value="Ryder">Ryder 190</option>
            </select>
        </div>
        <div class="input-group">
            <label>CARGA ($)</label>
            <input type="number" id="moneyInput" inputmode="decimal" oninput="calculateRemainingKM()">
        </div>
        <div class="input-group">
            <label>GAS ($/L)</label>
            <input type="number" id="priceInput" inputmode="decimal" value="23.50" oninput="calculateRemainingKM()">
        </div>
    </div>

    <div class="mode-selector">
        <div class="mode-btn" onclick="setMode('taxi', this)">TAXI</div>
        <div class="mode-btn active" onclick="setMode('drive', this)">DRIVE</div>
        <div class="mode-btn" onclick="setMode('sport', this)">SPORT</div>
    </div>

    <div class="button-row">
        <button class="btn-action" id="btnPlay" onclick="toggleDrive()">INICIAR</button>
        <button class="btn-action btn-save" onclick="saveTripData()">GUARDAR</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- LÓGICA JAVASCRIPT ---
    let ltsRestantes = 0, ltsIniciales = 0, rendActual = 15;
    let activo = false, wId, lastPos = null;
    let totalDist = 0, seconds = 0;
    let timerInterval;

    window.onload = function() { loadHistory(); };

    function setMode(mode, element) {
        document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    }

    // --- CORRECCIÓN MAPA ---
    const map = L.map('map', {
        zoomControl: false, 
        attributionControl: false,
        dragging: false, // Desactiva arrastre para permitir scroll
        zoomAnimation: false
    }).setView([19.4326, -99.1332], 13);
    
    // URL segura para tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    function calculateRemainingKM() {
        let money = parseFloat(document.getElementById('moneyInput').value) || 0;
        let price = parseFloat(document.getElementById('priceInput').value) || 1;
        let vehicle = document.getElementById('vehicleSelect').value;
        if(vehicle === 'Ryder') rendActual = 30;
        else if(vehicle === 'Vento') rendActual = 15;
        else rendActual = 12;
        ltsRestantes = money / price;
        ltsIniciales = ltsRestantes;
        document.getElementById('rangeVal').innerText = Math.round(ltsRestantes * rendActual);
        updateFuelBar();
    }

    function updateFuelBar() {
        const bar = document.getElementById('fuelBar');
        let percentage = (ltsIniciales === 0 || !ltsIniciales) ? 0 : (ltsRestantes / ltsIniciales) * 100;
        bar.style.height = Math.min(percentage, 100) + "%";
    }

    function toggleDrive() {
        const btn = document.getElementById('btnPlay');
        if(activo) {
            navigator.geolocation.clearWatch(wId);
            activo = false;
            btn.innerText = "INICIAR";
            clearInterval(timerInterval);
        } else {
            activo = true;
            totalDist = 0;
            btn.innerText = "PAUSAR";
            timerInterval = setInterval(() => { seconds++; }, 1000);
            
            wId = navigator.geolocation.watchPosition(p => {
                let v = p.coords.speed ? p.coords.speed * 3.6 : 0;
                document.getElementById('bigSpeed').innerText = Math.round(v);
                let rpm = (v / 140) * 100;
                document.getElementById('rpmBar').style.height = Math.min(rpm, 100) + "%";
                
                if(lastPos) {
                    let d = map.distance(lastPos, [p.coords.latitude, p.coords.longitude]) / 1000;
                    totalDist += d;
                    ltsRestantes -= (d / rendActual);
                    document.getElementById('distVal').innerText = totalDist.toFixed(2);
                    document.getElementById('rangeVal').innerText = Math.max(0, Math.round(ltsRestantes * rendActual));
                    updateFuelBar();
                }
                lastPos = [p.coords.latitude, p.coords.longitude];
                map.panTo(lastPos);
            }, null, {enableHighAccuracy: true});
        }
    }

    function saveTripData() {
        let vehicle = document.getElementById('vehicleSelect').value;
        let trip = { vehicle: vehicle, dist: totalDist.toFixed(2) };
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
        history.push(trip);
        localStorage.setItem('tripHistory', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
        let tbody = document.getElementById('historyBody');
        tbody.innerHTML = "";
        history.reverse().slice(0, 3).forEach(trip => {
            tbody.innerHTML += `<tr><td>${trip.vehicle}</td><td>${trip.dist} km</td></tr>`;
        });
    }
</script>
</body>
</html>
