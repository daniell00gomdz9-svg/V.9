<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akron Voyager Pro PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-accent: #3388ff;
            --bg-color: #000000;
            --text-color: #ffffff;
            --score-color: #4cd964;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: all 0.5s;
        }

        /* --- ESTILOS DE MODOS --- */
        body.mode-drive { --main-accent: #ffffff; --bg-color: #1a1a1a; }
        body.mode-drive .gauge-container { border: 8px solid #444; border-radius: 50%; }
        body.mode-drive #bigSpeed { font-family: 'Times New Roman', serif; font-size: 70px; }

        body.mode-sport { --main-accent: #ff3b30; --bg-color: #000000; }
        body.mode-sport .gauge-container { border: 4px solid var(--main-accent); border-radius: 20px; }
        body.mode-sport #bigSpeed { font-family: 'Orbitron', sans-serif; font-size: 80px; color: var(--main-accent); }

        body.mode-taxi { --main-accent: #00ffcc; --bg-color: #050505; }
        body.mode-taxi .gauge-container { border: none; background: #111; border-radius: 10px; }
        body.mode-taxi #bigSpeed { font-family: 'Orbitron', sans-serif; font-size: 90px; color: var(--main-accent); }

        /* --- ESTRUCTURA GENERAL --- */
        .dashboard-top { height: 250px; display: flex; flex-direction: row; align-items: center; justify-content: center; position: relative; border-bottom: 2px solid #333; gap: 15px; background-color: var(--bg-color); }
        .side-container { width: 40px; height: 150px; background: #111; border: 2px solid #333; border-radius: 5px; position: relative; overflow: hidden; }
        .side-bar { position: absolute; bottom: 0; width: 100%; height: 0%; transition: height 0.3s; }
        .gauge-container { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; transition: all 0.5s; }
        .needle { position: absolute; width: 4px; height: 75px; background: var(--main-accent); bottom: 50%; left: calc(50% - 2px); transform-origin: bottom center; border-radius: 10px; transition: transform 0.2s; z-index: 5; }
        body.mode-taxi .needle { display: none; }
        #bigSpeed { margin: 0; transition: all 0.3s; }
        .unit-label { font-size: 12px; color: #888; position: absolute; bottom: 15px; }

        /* --- NUEVO PANEL DE DATOS --- */
        .data-panel-container { width: 100%; display: flex; justify-content: space-around; background: #000000; padding: 10px; border-top: 2px solid #333; box-sizing: border-box; }
        .data-item { text-align: center; flex: 1; }
        .data-label { font-size: 9px; color: #888; text-transform: uppercase; display:block; }
        .data-value { font-size: 16px; font-weight: 900; color: #fff; }
        
        /* Estilo especial para el Score */
        #scoreVal { color: var(--score-color); font-size: 20px; text-shadow: 0 0 10px var(--score-color); }

        .map-container { height: 150px; position: relative; border-bottom: 2px solid #333; }
        #map { height: 100%; width: 100%; }

        .history-panel { flex: 1; background: #111; overflow-y: auto; padding: 10px; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table th { color: #888; text-align: left; padding: 5px; }
        .history-table td { color: #fff; padding: 5px; border-bottom: 1px solid #333; }

        .control-panel { width: 100%; background-color: #000000; border-top: 1px solid #333; }
        .grid-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 2px; }
        input, select { background: #111; border: 1px solid #333; color: #fff; padding: 4px; border-radius: 6px; font-size: 11px;}
        label { color: #888; font-size: 9px; }

        .mode-selector { display: flex; justify-content: space-around; padding: 5px; background: #111; }
        .mode-btn { color: #888; font-size: 11px; font-weight: 700; cursor: pointer; padding: 6px 12px; border-radius: 10px; }
        .mode-btn.active { color: white; background-color: #333; }

        .controls-bottom { padding: 5px; }
        .button-row { display: flex; gap: 10px; width: 100%; }
        .btn-action { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 12px; font-weight: 900; }
        .btn-active { background: #fff; color: #000; }
        .btn-save { background: #4cd964; color: #000; }
    </style>
</head>
<body class="mode-drive">

<div class="dashboard-top">
    <div class="side-container">
        <div class="side-bar" id="fuelBar" style="background: #4cd964;"></div>
    </div>
    
    <div class="gauge-container" id="gaugeBody">
        <div id="needle" class="needle"></div>
        <h1 id="bigSpeed">0</h1>
        <div class="unit-label">KM/H</div>
    </div>

    <div class="side-container">
        <div class="side-bar" id="rpmBar" style="background: var(--main-accent);"></div>
    </div>
</div>

<div class="data-panel-container">
    <div class="data-item">
        <span class="data-label">Eco-Score</span>
        <span class="data-value" id="scoreVal">100</span>
    </div>
    <div class="data-item">
        <span class="data-label">Distancia</span>
        <span class="data-value" id="distVal">0.00</span>
    </div>
    <div class="data-item">
        <span class="data-label">Tiempo</span>
        <span class="data-value" id="timeVal">00:00</span>
    </div>
</div>

<div class="map-container">
    <div id="map"></div>
</div>

<div class="history-panel">
    <h3 style="margin-top:0; font-size:14px; color:#aaa;">Historial</h3>
    <table class="history-table">
        <thead><tr><th>Vehículo</th><th>Dist.</th><th>Score</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<div class="control-panel">
    <div class="grid-panel">
        <div class="input-group">
            <label>VEHÍCULO</label>
            <select id="vehicleSelect" onchange="calculateRemainingKM()">
                <option value="Spark">Spark</option>
                <option value="Vento">Vento</option>
                <option value="Ryder">Ryder 190</option>
            </select>
        </div>
        <div class="input-group">
            <label>CARGA ($)</label>
            <input type="number" id="moneyInput" oninput="calculateRemainingKM()">
        </div>
        <div class="input-group">
            <label>GAS ($/L)</label>
            <input type="number" id="priceInput" value="23.50" oninput="calculateRemainingKM()">
        </div>
    </div>

    <div class="mode-selector">
        <div class="mode-btn" onclick="setMode('taxi', this)">TAXI</div>
        <div class="mode-btn active" onclick="setMode('drive', this)">DRIVE</div>
        <div class="mode-btn" onclick="setMode('sport', this)">SPORT</div>
    </div>

    <div class="controls-bottom">
        <div class="button-row">
            <button class="btn-action" id="btnPlay" onclick="toggleDrive()">INICIAR</button>
            <button class="btn-action btn-save" onclick="saveTripData()">GUARDAR</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let ltsRestantes = 0, ltsIniciales = 0, rendActual = 15;
let activo = false, wId, lastPos = null;
let totalDist = 0, seconds = 0;
let timerInterval;
let currentScore = 100;
let lastSpeed = 0;

window.onload = function() { loadHistory(); };

function setMode(mode, element) {
    document.body.className = 'mode-' + mode;
    document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
}

const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([19.4326, -99.1332], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
const ruta = L.polyline([], {color: '#3388ff', weight: 4, opacity: 0.7}).addTo(map);
const userMarker = L.circleMarker([0, 0], {color: '#ffffff', fillColor: '#3388ff', fillOpacity: 1, radius: 6}).addTo(map);

function calculateRemainingKM() {
    let money = parseFloat(document.getElementById('moneyInput').value) || 0;
    let price = parseFloat(document.getElementById('priceInput').value) || 1;
    let vehicle = document.getElementById('vehicleSelect').value;
    
    if(vehicle === 'Ryder') rendActual = 30;
    else if(vehicle === 'Vento') rendActual = 15;
    else rendActual = 12;

    ltsRestantes = money / price;
    ltsIniciales = ltsRestantes;
    updateFuelBar();
}

function updateFuelBar() {
    const bar = document.getElementById('fuelBar');
    let percentage = (ltsIniciales === 0) ? 0 : (ltsRestantes / ltsIniciales) * 100;
    bar.style.height = Math.min(percentage, 100) + "%";
}

function updateTimer() {
    seconds++;
    let mins = Math.floor(seconds / 60);
    let secs = seconds % 60;
    document.getElementById('timeVal').innerText = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}

// --- LÓGICA DE ECO-SCORE ---
function updateScore(speed, accel) {
    let penalty = 0;
    
    // Penalización por velocidad (más de 110km/h)
    if(speed > 110) penalty += 0.5;
    
    // Penalización por aceleración brusca (cambio de velocidad > 20km/h en un segundo)
    if(accel > 20) penalty += 2;
    
    // Penalización por frenado brusco (desaceleración > 20km/h en un segundo)
    if(accel < -20) penalty += 3;

    currentScore = Math.max(0, currentScore - penalty);
    document.getElementById('scoreVal').innerText = Math.round(currentScore);
    
    // Cambiar color del score según valor
    let color = '#4cd964';
    if(currentScore < 80) color = '#ffcc00';
    if(currentScore < 50) color = '#ff3b30';
    document.getElementById('scoreVal').style.color = color;
    document.getElementById('scoreVal').style.textShadow = `0 0 10px ${color}`;
}

function toggleDrive() {
    const btn = document.getElementById('btnPlay');
    if(activo) {
        navigator.geolocation.clearWatch(wId);
        activo = false;
        btn.innerText = "INICIAR";
        btn.classList.remove('btn-active');
        clearInterval(timerInterval);
    } else {
        activo = true;
        totalDist = 0;
        currentScore = 100; // Reset score
        btn.innerText = "PAUSAR";
        btn.classList.add('btn-active');
        timerInterval = setInterval(updateTimer, 1000);
        
        wId = navigator.geolocation.watchPosition(p => {
            let v = p.coords.speed ? p.coords.speed * 3.6 : 0;
            let speedRound = Math.round(v);
            let acceleration = speedRound - lastSpeed;
            
            document.getElementById('bigSpeed').innerText = speedRound;
            updateScore(speedRound, acceleration);
            lastSpeed = speedRound;
            
            let angle = -135 + (v * 1.5);
            document.getElementById('needle').style.transform = `rotate(${Math.min(angle, 135)}deg)`;
            
            let rpm = (v / 140) * 100;
            document.getElementById('rpmBar').style.height = Math.min(rpm, 100) + "%";
            
            let pos = [p.coords.latitude, p.coords.longitude];
            userMarker.setLatLng(pos);
            ruta.addLatLng(pos);
            map.panTo(pos);
            
            if(lastPos) {
                let d = map.distance(lastPos, pos) / 1000;
                if(d > 0.001) {
                    totalDist += d;
                    ltsRestantes -= (d / rendActual);
                    document.getElementById('distVal').innerText = totalDist.toFixed(2);
                    updateFuelBar();
                }
            }
            lastPos = pos;
        }, null, {enableHighAccuracy: true});
    }
}

function saveTripData() {
    if(totalDist === 0) { alert("Realiza un viaje primero"); return; }
    
    let vehicle = document.getElementById('vehicleSelect').value;
    let trip = {
        vehicle: vehicle,
        dist: totalDist.toFixed(2),
        score: Math.round(currentScore)
    };
    
    let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
    history.push(trip);
    localStorage.setItem('tripHistory', JSON.stringify(history));
    
    alert(`Viaje guardado. Eco-Score: ${trip.score}`);
    loadHistory();
    
    // Reiniciar
    if(activo) toggleDrive();
    totalDist = 0; seconds = 0; currentScore = 100;
    document.getElementById('timeVal').innerText = "00:00";
    document.getElementById('distVal').innerText = "0.00";
    document.getElementById('scoreVal').innerText = "100";
    calculateRemainingKM();
}

function loadHistory() {
    let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
    let tbody = document.getElementById('historyBody');
    tbody.innerHTML = "";
    
    history.reverse().slice(0, 5).forEach(trip => {
        let row = `<tr>
            <td>${trip.vehicle}</td>
            <td>${trip.dist} km</td>
            <td style="color:${trip.score > 70 ? '#4cd964' : '#ff3b30'}">${trip.score}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
</script>
</body>
</html>
