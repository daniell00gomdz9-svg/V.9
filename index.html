<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V.9</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
            --accent-color: #3388ff;
            --text-color: #ffffff;
            --accent-gradient: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
            /* Ajuste de alturas para dar más espacio a los botones */
            --top-height: 140px;
            --data-height: 50px;
            --map-height: 100px; /* Reducido un poco el mapa */
            --control-height: auto;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-gradient);
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
            padding-top: env(safe-area-inset-top);
        }

        /* --- DASHBOARD TOP --- */
        .dashboard-top {
            height: var(--top-height);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid rgba(51, 136, 255, 0.3);
            background: rgba(0, 0, 0, 0.2);
            gap: 10px;
            flex-shrink: 0;
            padding: 0 10px;
        }

        .side-container {
            width: 20px;
            height: 80px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(51, 136, 255, 0.3);
        }

        .side-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: var(--accent-gradient);
            transition: height 0.2s;
        }

        .gauge-container {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(51,136,255,0.1) 0%, rgba(0,0,0,0.5) 100%);
            box-shadow: 0 0 15px rgba(51, 136, 255, 0.4);
        }

        #bigSpeed {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .unit-label {
            font-size: 10px;
            color: #fff;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        /* --- PANEL DATOS --- */
        .data-panel-container {
            width: 100%;
            height: var(--data-height);
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--accent-color);
            flex-shrink: 0;
        }

        .data-item { text-align: center; }
        .data-label { font-size: 9px; color: #aab; text-transform: uppercase; letter-spacing: 1px; }
        .data-value { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #fff; }

        /* --- MAPA --- */
        .map-container { 
            height: var(--map-height); 
            flex-shrink: 0;
            z-index: 1;
            background: #000;
            border-bottom: 1px solid var(--accent-color);
        }
        #map { height: 100%; width: 100%; }

        /* --- HISTORIAL --- */
        .history-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            overflow-y: auto;
            padding: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .history-table td { color: #fff; padding: 4px; border-bottom: 1px solid rgba(51, 136, 255, 0.2); }

        /* --- CONTROL PANEL --- */
        .control-panel {
            background: rgba(0, 0, 0, 0.8); /* Fondo un poco más oscuro */
            border-top: 2px solid var(--accent-color);
            padding: 5px; /* Reducido padding superior */
            flex-shrink: 0;
            padding-bottom: calc(5px + env(safe-area-inset-bottom));
        }

        .grid-panel { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        .input-group { display: flex; flex-direction: column; }
        input, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 6px; /* Padding reducido */
            border-radius: 4px;
            font-size: 12px;
            -webkit-appearance: none;
            width: 100%;
        }
        label { color: var(--accent-color); font-size: 7px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1px; }

        .mode-selector { display: flex; justify-content: space-around; gap: 4px; margin-bottom: 5px; }
        .mode-btn {
            color: #fff;
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            padding: 6px; /* Padding reducido */
            border-radius: 4px;
            border: 1px solid rgba(51, 136, 255, 0.3);
            text-align: center;
            flex: 1;
        }
        .mode-btn.active {
            background: var(--accent-gradient);
            box-shadow: 0 0 10px rgba(51, 136, 255, 0.5);
            border-color: #fff;
        }

        /* --- FILA DE BOTONES AJUSTADA --- */
        .button-row { display: flex; gap: 5px; margin-top: 2px; }
        .btn-action {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid #fff;
            color: #fff;
            padding: 10px; /* Padding reducido */
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-save {
            background: var(--accent-gradient);
            border: none;
        }
    </style>
</head>
<body>

<div class="dashboard-top">
    <div class="side-container">
        <div class="side-bar" id="fuelBar"></div>
    </div>
    
    <div class="gauge-container">
        <h1 id="bigSpeed">0</h1>
        <div class="unit-label">KM/H</div>
    </div>

    <div class="side-container">
        <div class="side-bar" id="rpmBar"></div>
    </div>
</div>

<div class="data-panel-container">
    <div class="data-item">
        <span class="data-label">Distancia</span>
        <div class="data-value" id="distVal">0.00</div>
    </div>
    <div class="data-item">
        <span class="data-label">Autonomía</span>
        <div class="data-value" id="rangeVal">0</div>
    </div>
    <div class="data-item">
        <span class="data-label">Tiempo</span>
        <div class="data-value" id="timeVal">00:00</div>
    </div>
</div>

<div class="map-container">
    <div id="map"></div>
</div>

<div class="history-panel">
    <table class="history-table">
        <tbody id="historyBody"></tbody>
    </table>
</div>

<div class="control-panel">
    <div class="grid-panel">
        <div class="input-group">
            <label>VEHÍCULO</label>
            <select id="vehicleSelect" onchange="calculateRemainingKM()">
                <option value="Spark">Spark</option>
                <option value="Vento">Vento</option>
                <option value="Ryder">Ryder 190</option>
            </select>
        </div>
        <div class="input-group">
            <label>CARGA ($)</label>
            <input type="number" id="moneyInput" inputmode="decimal" oninput="calculateRemainingKM()">
        </div>
        <div class="input-group">
            <label>GAS ($/L)</label>
            <input type="number" id="priceInput" inputmode="decimal" value="23.50" oninput="calculateRemainingKM()">
        </div>
    </div>

    <div class="mode-selector">
        <div class="mode-btn" onclick="setMode('taxi', this)">TAXI</div>
        <div class="mode-btn active" onclick="setMode('drive', this)">DRIVE</div>
        <div class="mode-btn" onclick="setMode('sport', this)">SPORT</div>
    </div>

    <div class="button-row">
        <button class="btn-action" id="btnPlay" onclick="toggleDrive()">INICIAR</button>
        <button class="btn-action btn-save" onclick="saveTripData()">GUARDAR</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- LÓGICA JAVASCRIPT ---
    let ltsRestantes = 0, ltsIniciales = 0, rendActual = 15;
    let activo = false, wId, lastPos = null;
    let totalDist = 0, seconds = 0;
    let timerInterval;

    // Registrar Service Worker para PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    window.onload = function() { loadHistory(); };

    function setMode(mode, element) {
        document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        console.log("Modo cambiado a: " + mode);
    }

    // Inicialización del mapa con estilos optimizados para móvil
    const map = L.map('map', {
        zoomControl: false, 
        attributionControl: false,
        dragging: false, 
        zoomAnimation: false,
        boxZoom: false,
        doubleClickZoom: false,
