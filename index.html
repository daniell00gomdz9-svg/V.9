<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V.9</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  background:#0b0b12;
  font-family:Arial,sans-serif;
  color:white;
  text-align:center;
}

/* SELECTOR VEHÍCULO + INPUTS */
select,input{
  padding:10px;
  border-radius:10px;
  background:#111;
  color:white;
  border:none;
  margin:5px;
  width:150px;
}

/* VELOCÍMETRO */
.gauge-wrapper{
  position:relative;
  width:280px;
  height:280px;
}

.gauge{
  width:100%;
  height:100%;
  border-radius:50%;
  background:#111;
  border:4px solid #222;
  position:relative;
  box-shadow:0 0 20px #4b0082;
}

.needle{
  position:absolute;
  width:4px;
  height:120px;
  background:white;
  top:20px;
  left:50%;
  transform-origin:bottom center;
  transform:rotate(-135deg);
  transition:transform 0.2s linear;
}

.zone-red{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  background:conic-gradient(
    transparent 0deg 220deg,
    rgba(255,0,0,0.3) 220deg 270deg,
    transparent 270deg 360deg
  );
}

.digital-speed{
  font-size:70px;
  font-weight:bold;
  margin-top:10px;
  transition:0.3s;
}

.km-label{
  font-size:18px;
  color:#aaa;
}

/* TACÓMETRO DIGITAL (barra) */
.rpm-container{
  width:80%;
  height:20px;
  background:#222;
  margin:15px auto;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 12px #8a2be2;
}

.rpm-fill{
  height:100%;
  width:0%;
  background:#00ff88;
  transition:width 0.2s, background 0.3s;
}

/* GASOLINA/BATERÍA VERTICAL */
.fuel-vertical-container{
  width:30px;
  height:200px;
  background:#222;
  border-radius:15px;
  overflow:hidden;
  display:flex;
  justify-content:center;
  position:relative;
}

.fuel-vertical{
  width:100%;
  height:100%;
  background:#00ff88;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  transition:height 0.3s;
  box-shadow:0 0 12px #00ff88;
}

#fuelEmoji{
  margin-bottom:4px;
  filter: drop-shadow(0 0 6px #00ff88);
  font-size:16px;
}

/* BOTONES */
button{
  padding:12px 25px;
  margin:5px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#7c3aed,#ff00ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 12px #ff00ff;
}

/* MAPA */
#map{
  height:300px;
  margin-top:15px;
  border-radius:15px;
}

/* TIMER */
#timer{
  font-size:22px;
  margin-top:10px;
}
</style>
</head>
<body>

<h2>Tablero Tesla Style</h2>

<select id="vehicleSelect" onchange="changeVehicle()">
  <option value="35">Moto Vento Ryder 190</option>
  <option value="18">Chevrolet Spark</option>
</select>

<!-- Velocímetro + Gasolina vertical lado a lado -->
<div style="display:flex; justify-content:center; align-items:flex-start; gap:40px; margin-top:20px;">
  <!-- Velocímetro -->
  <div class="gauge-wrapper">
    <div class="gauge" id="speedGauge"></div>
    <div class="zone-red"></div>
    <div id="speedNeedle" class="needle"></div>
    <div id="digitalSpeed" class="digital-speed" style="margin-top:10px;">0</div>
    <div class="km-label">km/h</div>
  </div>

  <!-- Gasolina vertical -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
    <div class="fuel-vertical-container">
      <div id="fuelVerticalLine" class="fuel-vertical">
        <span id="fuelEmoji">⛽️</span>
      </div>
    </div>
    <div id="fuelText">Gasolina: 100% | Autonomía: 0 km | Costo: $0.00</div>
    <input type="number" id="litersInput" placeholder="Litros">
    <input type="number" id="priceInput" placeholder="Precio por litro" step="0.01">
    <button onclick="loadFuel()">Aceptar</button>
  </div>
</div>

<!-- Tacómetro -->
<div class="rpm-container">
  <div id="rpmFill" class="rpm-fill"></div>
</div>
<div id="digitalRPM" class="digital-speed">0</div>
<div class="km-label">x1000 RPM</div>

<!-- Alerta velocidad -->
<input type="number" id="speedLimitInput" placeholder="Velocidad límite km/h">

<div id="timer">00:00:00</div>

<div>
  <button onclick="startTracking()">Iniciar</button>
  <button onclick="pauseTracking()">Pausa</button>
  <button onclick="stopTracking()">Finalizar</button>
  <button onclick="saveTrip()">Guardar Viaje</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
/* VARIABLES */
let map=L.map('map').setView([19.4,-99.1],15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(map);

let routeCoordinates=[];
let pathLine=L.polyline(routeCoordinates,{color:'#a855f7',weight:6}).addTo(map);

let watchId,isRunning=false;
let speed=0,lastPosition=null,totalDistance=0;
let fuelLiters=5,totalLiters=5,efficiency=35;
let secondsElapsed=0,timerInterval;

/* VEHÍCULO */
function changeVehicle(){efficiency=parseFloat(document.getElementById("vehicleSelect").value);}

/* CARGA GASOLINA */
function loadFuel(){
  fuelLiters=parseFloat(document.getElementById("litersInput").value);
  totalLiters=fuelLiters;
  let pricePerLiter=parseFloat(document.getElementById("priceInput").value)||0;
  let totalCost=fuelLiters*pricePerLiter;
  updateFuel(totalCost);
}

function updateFuel(totalCost=0){
  let percent=(fuelLiters/totalLiters)*100;
  if(percent<0) percent=0;

  let fuelLine=document.getElementById("fuelVerticalLine");
  fuelLine.style.height=percent+"%";
  fuelLine.style.background=percent>50?"#00ff88":percent>20?"#ffcc00":"#ff0033";

  document.getElementById("fuelText").innerText=
    "Gasolina: "+fuelLiters.toFixed(1)+" L | Autonomía: "+(fuelLiters*efficiency).toFixed(1)+" km | Costo: $"+totalCost.toFixed(2);
}

/* GPS */
function startTracking(){
  if(isRunning) return;
  isRunning=true;
  startTimer();
  watchId=navigator.geolocation.watchPosition(pos=>{
    let lat=pos.coords.latitude;
    let lng=pos.coords.longitude;
    let newPoint=[lat,lng];

    if(lastPosition){
      let d=map.distance(lastPosition,newPoint)/1000;
      totalDistance+=d;
      fuelLiters-=d/efficiency;
      updateFuel();
    }

    lastPosition=newPoint;
    routeCoordinates.push(newPoint);
    pathLine.setLatLngs(routeCoordinates);
    map.setView(newPoint);

    speed=pos.coords.speed?pos.coords.speed*3.6:0;
    updateDashboard();
  },()=>alert("Activa GPS"),{enableHighAccuracy:true});
}

/* Pausa / Finalizar */
function pauseTracking(){ navigator.geolocation.clearWatch(watchId); isRunning=false; stopTimer(); }
function stopTracking(){ pauseTracking(); lastPosition=null; }

/* DASHBOARD */
function updateDashboard(){
  // Velocímetro
  let deg=-135+(speed/200)*270;
  document.getElementById("speedNeedle").style.transform="rotate("+deg+"deg)";
  let digitalSpeed=document.getElementById("digitalSpeed");
  digitalSpeed.innerText=speed.toFixed(0);

  // Tacómetro
  let rpm=speed*40;
  document.getElementById("digitalRPM").innerText=(rpm/1000).toFixed(1);
  let fill=document.getElementById("rpmFill");
  let rpmPercent=Math.min((rpm/8000)*100,100);
  fill.style.width=rpmPercent+"%";
  fill.style.background=rpmPercent<60?"#00ff88":rpmPercent<85?"#ffcc00":"#ff0033";

  // Alerta velocidad
  checkSpeedAlert();
}

function checkSpeedAlert(){
  let limit=parseFloat(document.getElementById("speedLimitInput").value);
  let digital=document.getElementById("digitalSpeed");
  if(limit && speed>limit){
    digital.style.color=digital.style.color==="red"?"#ff0033":"white";
    if(!window.beepAudio){window.beepAudio=new Audio('https://www.soundjay.com/button/beep-07.wav');}
    if(!window.beepPlaying){window.beepAudio.play(); window.beepPlaying=true;
      setTimeout(()=>{window.beepPlaying=false;},1000);}
  } else {
    digital.style.color=speed<80?"#00ff88":speed<140?"#ffcc00":"#ff0033";
  }
}

/* TIMER */
function startTimer(){
  timerInterval=setInterval(()=>{
    secondsElapsed++;
    let h=Math.floor(secondsElapsed/3600);
    let m=Math.floor((secondsElapsed%3600)/60);
    let s=secondsElapsed%60;
    document.getElementById("timer").innerText=
      (h<10?"0":"")+h+":"+
      (m<10?"0":"")+m+":"+
      (s<10?"0":"")+s;
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); }

/* GUARDAR VIAJE */
function saveTrip(){
  let vehicle=document.getElementById("vehicleSelect")
    .options[document.getElementById("vehicleSelect").selectedIndex].text;
  let trip={date:new Date().toLocaleString(), vehicle:vehicle, distance:totalDistance.toFixed(2)+" km", time:document.getElementById("timer").innerText};
  let trips=JSON.parse(localStorage.getItem("trips")||"[]");
  trips.push(trip);
  localStorage.setItem("trips",JSON.stringify(trips));
  alert("Viaje guardado ✅");
}
</script>
</body>
</html>
